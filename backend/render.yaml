services:
  - type: web
    name: credit-risk-backend
    env: python
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: ALLOWED_ORIGINS
        value: "*" # Change this to your frontend URL in production
